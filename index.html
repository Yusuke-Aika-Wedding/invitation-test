<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>祐輔・愛佳 Wedding Invitation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <section id="messagePage" class="message-page">
      <div class="message-card">
        <p class="guest-name"><span id="guestName">結婚太郎・結婚花子</span> 様</p>
        <p>
          この度、祐輔と愛佳は結婚することになりました。<br>
          結婚式の出欠席についての入力・送信をよろしくお願いします。<br>
          今後もよろしくお願いします。
        </p>
        <p class="signature">祐輔・愛佳</p>
        <p class="tap-text">Tap to Open</p>
      </div>
    </section>

    <section id="invitationPage" class="invitation-page hidden">
      <div class="hero">
        <img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1200&q=80" alt="新郎新婦の仮写真">
        <div class="hero-text">
          <p>Wedding Invitation</p>
          <h1>Yusuke & Aika</h1>
        </div>
      </div>

      <section class="card">
        <h2>結婚式まで</h2>
        <div id="countdown" class="countdown">Loading...</div>
      </section>

      <section class="card">
        <h2>会場</h2>
        <p class="venue">キンプトン新宿東京</p>
        <iframe
          src="https://www.google.com/maps?q=キンプトン新宿東京&output=embed"
          loading="lazy">
        </iframe>
      </section>

      <section class="card">
        <h2>会場までの行き方動画</h2>
        <video controls poster="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80">
          <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
        </video>
      </section>

      <section id="formArea" class="card">
        <h2>出欠フォーム</h2>

        <form id="rsvpForm" method="POST" target="hiddenFrame">
          <input type="hidden" name="guestId" value="taro_hanako">
          <input type="hidden" name="guestName" value="結婚太郎・結婚花子">

          <label>
            氏名
            <input type="text" name="name" required placeholder="例：結婚 太郎">
          </label>

          <label>
            メールアドレス
            <input type="email" name="email" required placeholder="example@gmail.com">
          </label>

          <label>
            出欠
            <select name="attendance" required>
              <option value="">選択してください</option>
              <option value="出席">出席</option>
              <option value="欠席">欠席</option>
            </select>
          </label>

          <label>
            メッセージ
            <textarea name="message" rows="4" placeholder="任意でご記入ください"></textarea>
          </label>

          <button type="submit">送信する</button>
        </form>

        <iframe name="hiddenFrame" class="hidden-frame"></iframe>
      </section>

      <section id="thanksArea" class="card thanks hidden">
        <h2>ご回答ありがとうございます</h2>
        <p>ご来場お待ちしております！</p>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
